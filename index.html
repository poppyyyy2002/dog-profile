<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Profile 🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #faefba; 
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }

        .card { 
            background: white; width: 100%; max-width: 550px;
            border-radius: 35px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            padding: 40px; border: 4px solid #fff; box-sizing: border-box; margin-bottom: 20px;
        }

        .dog-logo { text-align: center; margin-bottom: 15px; }
        .dog-logo img { width: 180px; height: auto; display: block; margin: 0 auto; }

        h2 { 
            text-align: center; color: #3ebc8e; font-family: 'Fredoka', sans-serif; 
            font-size: 42px; margin: 10px 0 5px 0; 
        }
        
        .author-tag { text-align: center; color: #BEBEBE; font-size: 13px; margin-bottom: 35px; display: block; }

        label { font-weight: 600; color: #7B7B7B; display: block; margin-top: 22px; font-size: 14px; }
        
        select, input { 
            width: 100%; padding: 14px; margin-top: 10px; border: 2px solid #fcf2d1; 
            border-radius: 15px; background-color: #fffdf5; font-size: 15px; outline: none;
            font-family: 'Poppins', sans-serif; color: #444; box-sizing: border-box;
        }

        #result-box { 
            margin-top: 40px; padding: 30px; border-radius: 25px; background-color: #fff; 
            border: 2px dashed #3ebc8e; color: #444; line-height: 1.8; display: none; font-size: 15px;
        }

        .advice-header {
            text-align: center; font-weight: 600; color: #4F4F4F; background-color: #E0E0E0;
            padding: 10px 25px; border-radius: 50px; display: block; width: fit-content; margin: 0 auto 25px auto;
        }

        .highlight-key { color: #f7bf6e; font-weight: 600; }

        /* Age Table */
        .age-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .age-table th, .age-table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .age-table th { background-color: #f9f9f9; color: #7B7B7B; }
        .match-highlight { background-color: rgba(247, 191, 110, 0.1); color: #f7bf6e; font-weight: 600; border: 2px solid #f7bf6e !important; }

        /* Game Section */
        .game-section { border-top: 2px solid #faefba; margin-top: 40px; padding-top: 30px; text-align: center; }
        .game-title { font-family: 'Fredoka', sans-serif; color: #f7bf6e; font-size: 24px; margin-bottom: 10px; }
        .game-desc { font-size: 13px; color: #999; margin-bottom: 20px; }
        .game-input-group { display: flex; gap: 10px; justify-content: center; }
        .game-input { width: 80px !important; margin-top: 0 !important; text-align: center; }
        .game-btn { background-color: #f7bf6e; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .game-btn:hover { background-color: #e67e22; }
        #mood-result { margin-top: 20px; font-weight: 600; color: #444; min-height: 40px; }

        /* Custom Symbols for Feedback */
        .feedback-section { margin-top: 25px; display: none; }
        .symbol-container { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
        
        .face-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #ccc; position: relative; cursor: pointer; transition: 0.3s; }
        .face-btn:hover { transform: scale(1.15); }
        
        /* Happy Face Symbol */
        .face-happy { border-color: #3ebc8e; }
        .face-happy::before, .face-happy::after { content: ''; position: absolute; width: 6px; height: 4px; border-radius: 50% 50% 0 0; border: 2px solid #3ebc8e; border-bottom: 0; top: 12px; }
        .face-happy::before { left: 8px; } .face-happy::after { right: 8px; }
        .face-happy .mouth { position: absolute; width: 16px; height: 8px; border-radius: 0 0 16px 16px; border: 2px solid #3ebc8e; border-top: 0; bottom: 8px; left: 10px; }

        /* Neutral Face Symbol */
        .face-neutral { border-color: #999; }
        .face-neutral::before, .face-neutral::after { content: ''; position: absolute; width: 4px; height: 4px; background: #999; border-radius: 50%; top: 14px; }
        .face-neutral::before { left: 10px; } .face-neutral::after { right: 10px; }
        .face-neutral .mouth { position: absolute; width: 16px; height: 2px; background: #999; bottom: 10px; left: 12px; }

        /* Angry Face Symbol */
        .face-angry { border-color: #f7bf6e; }
        .face-angry::before, .face-angry::after { content: ''; position: absolute; width: 8px; height: 2px; background: #f7bf6e; top: 12px; }
        .face-angry::before { left: 6px; transform: rotate(20deg); } .face-angry::after { right: 6px; transform: rotate(-20deg); }
        .face-angry .mouth { position: absolute; width: 14px; height: 6px; border-radius: 14px 14px 0 0; border: 2px solid #f7bf6e; border-bottom: 0; bottom: 8px; left: 11px; }

    </style>
</head>
<body>

<div class="card">
    <div class="dog-logo">
        <img src="S__155754498-removebg-preview.png" alt="Dog Logo">
    </div>

    <h2>Dog Profile</h2>
    <span class="author-tag">Made by Poppy H.</span>

    <label>🐾 Dog Breed</label>
    <select id="breed" onchange="generateAdvice()">
        <option value="">Select Breed...</option>
        <option value="shiba">Shiba Inu</option><option value="poodle">Poodle</option>
        <option value="corgi">Corgi</option><option value="maltese">Maltese</option>
        <option value="golden">Golden Retriever</option><option value="labrador">Labrador Retriever</option>
        <option value="frenchie">French Bulldog</option><option value="dachshund">Dachshund</option>
        <option value="schnauzer">Schnauzer</option><option value="pomeranian">Pomeranian</option>
        <option value="husky">Husky</option><option value="beagle">Beagle</option>
        <option value="border">Border Collie</option><option value="chihuahua">Chihuahua</option>
        <option value="pug">Pug</option><option value="shih-tzu">Shih Tzu</option>
        <option value="yorkshire">Yorkshire Terrier</option><option value="taiwan">Formosan Mountain Dog (Mix)</option>
        <option value="samoyed">Samoyed</option><option value="bichon">Bichon Frise</option>
    </select>

    <label>🎂 Dog Age</label>
    <select id="age" onchange="generateAdvice()">
        <option value="">Select Age...</option>
        <option value="1">0-1 year (A little baby, still growing)</option>
        <option value="2">2 years (A young adult, maturing)</option>
        <option value="4">3-5 years (The prime years)</option>
        <option value="10">7-10 years (Entering the senior stage)</option>
        <option value="15">10+ years (A super senior/elderly baby)</option>
    </select>

    <label>🔢 Body Size</label>
    <select id="bodySize" onchange="generateAdvice()">
        <option value="">Select Size...</option>
        <option value="small">Small (<10kg)</option>
        <option value="medium">Medium (10-25kg)</option>
        <option value="large">Large/Giant (>25kg)</option>
    </select>

    <label>🐕‍🦺 Activity</label>
    <select id="activity" onchange="generateAdvice()">
        <option value="">Select Level...</option>
        <option value="old">Too old to walk far</option>
        <option value="lazy">Lazy little piggy (Exercising < 10min/day)</option>
        <option value="good">Good puppy (Daily exercise 30-90min)</option>
        <option value="hyper">Hyperactive (Daily exercise 2hr+)</option>
        <option value="boss">Boss level (Unlimited energy every day)</option>
    </select>

    <label>🦴 Current Weight (kg)</label>
    <input type="number" id="weight" placeholder="Enter weight" oninput="generateAdvice()">

    <div id="result-box"></div>

    <div class="game-section">
        <div class="game-title">✨ Doggy Mood Reader</div>
        <div class="game-desc">Pick a number (0-100) to see how your dog feels today!</div>
        
        <div class="game-input-group">
            <input type="number" id="moodNumber" class="game-input" placeholder="0-100" min="0" max="100">
            <button class="game-btn" onclick="readDogMood()">Check Mood</button>
        </div>

        <div id="mood-result"></div>

        <div class="feedback-section" id="feedbackArea">
            <p style="font-size: 12px; color: #7B7B7B; margin-bottom: 10px;">Is this accurate?</p>
            <div class="symbol-container">
                <div class="face-btn face-happy" onclick="submitFeedback('Happy')"><div class="mouth"></div></div>
                <div class="face-btn face-neutral" onclick="submitFeedback('Neutral')"><div class="mouth"></div></div>
                <div class="face-btn face-angry" onclick="submitFeedback('Angry')"><div class="mouth"></div></div>
            </div>
            <p id="feedback-thanks" style="font-size: 11px; color: #3ebc8e; margin-top: 15px; font-weight:600;"></p>
        </div>
    </div>
</div>

<script>
const breedTips = {
    shiba: "Independent Shiba Inus are prone to skin issues; ensure a dry environment.",
    poodle: "Poodles are highly intelligent but prone to luxating patella; keep coats tangle-free.",
    corgi: "Corgis face significant spinal strain; strict weight management is crucial.",
    maltese: "Maltese dogs require heart health monitoring and dry eyes to avoid infection.",
    golden: "Active Goldens may need joint supplements and regular health screenings.",
    labrador: "Labradors easily overeat; monitor caloric intake to prevent obesity.",
    frenchie: "Frenchies have unique airways; avoid peak heat and ensure ventilation.",
    dachshund: "Dachshunds have fragile spines; avoid letting them jump from high surfaces.",
    schnauzer: "Schnauzers may have genetic pancreatic risks; a low-fat diet is best.",
    pomeranian: "Pomeranians are prone to tracheal collapse; use a harness, not a collar.",
    husky: "Huskies are vulnerable to heatstroke; ensure they stay hydrated and cool.",
    beagle: "Food-motivated Beagles have a high drive; use sniff games to tire them out.",
    border: "Border Collies need intense physical exercise and mental sniff games.",
    chihuahua: "Tiny Chihuahuas struggle with temp regulation; keep them warm.",
    pug: "Pugs have deep facial wrinkles that need daily cleaning.",
    "shih-tzu": "Shih Tzus have prominent eyes; be careful during play to prevent injury.",
    yorkshire: "Yorkies have sensitive gums; establish a teeth-brushing routine early.",
    taiwan: "Taiwan Mixes are resilient but still need consistent heartworm prevention.",
    samoyed: "Fluffy Samoyeds need deep drying after bathing to avoid hotspots.",
    bichon: "Bichon Frises are prone to separation anxiety and need grooming."
};

function generateAdvice() {
    const breed = document.getElementById('breed');
    const ageVal = document.getElementById('age').value;
    const bodySize = document.getElementById('bodySize').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const activityVal = document.getElementById('activity').value;
    const resultBox = document.getElementById('result-box');

    if (!breed.value || !ageVal || !bodySize || !activityVal) {
        resultBox.style.display = "none";
        return;
    }

    let weightAdvice = "";
    if (weight) {
        if (bodySize === "small" && weight > 10) weightAdvice = "<span class='highlight-key'>Weight is high for a small dog.</span> Consider a vet visit.";
        else if (bodySize === "medium" && weight > 25) weightAdvice = "<span class='highlight-key'>Weight exceeds standard for medium breeds.</span>";
        else if (bodySize === "large" && weight > 45) weightAdvice = "<span class='highlight-key'>Excess weight in large breeds puts high stress on the heart.</span>";
    }

    const tableData = [
        {age: 1, s: 15, m: 15, l: 12}, {age: 2, s: 24, m: 24, l: 22}, {age: 3, s: 28, m: 28, l: 31},
        {age: 5, s: 36, m: 36, l: 45}, {age: 10, s: 56, m: 60, l: 79}, {age: 15, s: 76, m: 83, l: 114}
    ];

    let tableHTML = `<table class="age-table"><thead><tr><th>Dog Age</th><th>Small</th><th>Medium</th><th>Large</th></tr></thead><tbody>`;
    tableData.forEach(row => {
        const isAgeMatch = (parseInt(ageVal) === row.age) || (ageVal == "4" && (row.age == 3 || row.age == 5));
        tableHTML += `<tr><td>${row.age == 3 ? '3-5' : (row.age == 15 ? '10+' : row.age)} yr</td>
            <td class="${isAgeMatch && bodySize === 'small' ? 'match-highlight' : ''}">${row.s} yrs</td>
            <td class="${isAgeMatch && bodySize === 'medium' ? 'match-highlight' : ''}">${row.m} yrs</td>
            <td class="${isAgeMatch && bodySize === 'large' ? 'match-highlight' : ''}">${row.l} yrs</td></tr>`;
    });
    tableHTML += `</tbody></table>`;

    resultBox.innerHTML = `<span class="advice-header">⭐️ Quick Advice</span>${breedTips[breed.value]} ${weightAdvice}<br><br><b>Age Table:</b>${tableHTML}`;
    resultBox.style.display = "block";
}

function readDogMood() {
    const num = document.getElementById('moodNumber').value;
    const moodDisplay = document.getElementById('mood-result');
    const feedbackArea = document.getElementById('feedbackArea');
    if (num === "" || num < 0 || num > 100) {
        moodDisplay.innerHTML = "<span style='color:red;'>Enter 0-100!</span>";
        return;
    }
    const moods = [
        "Your dog thinks you are the most amazing person! ❤️",
        "I want a treat... and another one. 🦴",
        "Can we go to the park? RIGHT NOW? 🐕",
        "I just want to cuddle with you. ✨",
        "Feeling sleepy... Nap on your lap? 💤",
        "You are my best friend forever! 🌟",
        "Is that a squirrel? Let me at it! 🐿️",
        "I feel so safe with you. 🏠"
    ];
    const index = Math.floor((num / 101) * moods.length);
    moodDisplay.innerHTML = `<span>" ${moods[index]} "</span>`;
    feedbackArea.style.display = "block";
    document.getElementById('feedback-thanks').innerText = "";
}

function submitFeedback(type) {
    const thanks = document.getElementById('feedback-thanks');
    if(type === 'Happy') thanks.innerText = "Glad you think so! 🐾";
    if(type === 'Neutral') thanks.innerText = "We'll try better! 🦴";
    if(type === 'Angry') thanks.innerText = "Doggy telepathy error! 😅";
}
</script>

</body>
</html>
