<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Profile 🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #faefba; 
            font-family: 'Poppins', sans-serif;
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
        }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 550px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            padding: 40px; 
            border: 4px solid #fff;
            box-sizing: border-box;
        }

        .dog-logo { text-align: center; margin-bottom: 15px; }
        .dog-logo img { width: 180px; height: auto; display: block; margin: 0 auto; }

        h2 { 
            text-align: center; 
            color: #3ebc8e; 
            font-family: 'Fredoka', sans-serif; 
            font-size: 42px; 
            margin: 10px 0 5px 0; 
        }
        
        .author-tag { 
            text-align: center; 
            color: #BEBEBE; 
            font-size: 13px; 
            margin-bottom: 35px; 
            display: block;
        }

        label { 
            font-weight: 600; 
            color: #7B7B7B; 
            display: block; 
            margin-top: 22px; 
            font-size: 14px; 
        }
        
        select, input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px;
            border: 2px solid #fcf2d1; 
            border-radius: 15px;
            background-color: #fffdf5; 
            font-size: 15px; 
            outline: none;
            font-family: 'Poppins', sans-serif;
            color: #444;
            box-sizing: border-box;
        }

        #result-box { 
            margin-top: 40px; 
            padding: 30px; 
            border-radius: 25px;
            background-color: #fff; 
            border: 2px dashed #3ebc8e;
            color: #444; 
            line-height: 1.8; 
            display: none;
            font-size: 15px;
        }

        .advice-header {
            text-align: center;
            font-weight: 600;
            color: #4F4F4F;
            background-color: #E0E0E0;
            padding: 10px 25px;
            border-radius: 50px;
            display: block;
            width: fit-content;
            margin: 0 auto 25px auto;
        }

        .highlight-key {
            color: #f7bf6e;
            font-weight: 600;
        }

        .age-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        .age-table th, .age-table td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: center;
        }
        .age-table th {
            background-color: #f9f9f9;
            color: #7B7B7B;
        }
        .match-highlight {
            background-color: rgba(247, 191, 110, 0.1);
            color: #f7bf6e;
            font-weight: 600;
            border: 2px solid #f7bf6e !important;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="dog-logo">
        <img src="S__155754498-removebg-preview.png" alt="Dog Logo">
    </div>

    <h2>Dog Profile</h2>
    <span class="author-tag">Made by Poppy H.</span>

    <label>🐾 Dog Breed</label>
    <select id="breed" onchange="generateAdvice()">
        <option value="">Select Breed...</option>
        <option value="shiba">Shiba Inu</option>
        <option value="poodle">Poodle</option>
        <option value="corgi">Corgi</option>
        <option value="maltese">Maltese</option>
        <option value="golden">Golden Retriever</option>
        <option value="labrador">Labrador Retriever</option>
        <option value="frenchie">French Bulldog</option>
        <option value="dachshund">Dachshund</option>
        <option value="schnauzer">Schnauzer</option>
        <option value="pomeranian">Pomeranian</option>
        <option value="husky">Husky</option>
        <option value="beagle">Beagle</option>
        <option value="border">Border Collie</option>
        <option value="chihuahua">Chihuahua</option>
        <option value="pug">Pug</option>
        <option value="shih-tzu">Shih Tzu</option>
        <option value="yorkshire">Yorkshire Terrier</option>
        <option value="taiwan">Formosan Mountain Dog (Mix)</option>
        <option value="samoyed">Samoyed</option>
        <option value="bichon">Bichon Frise</option>
    </select>

    <label>🎂 Dog Age</label>
    <select id="age" onchange="generateAdvice()">
        <option value="">Select Age...</option>
        <option value="1">0-1 year (A little baby, still growing)</option>
        <option value="2">2 years (A young adult, maturing)</option>
        <option value="4">3-5 years (The prime years)</option>
        <option value="10">7-10 years (Entering the senior stage)</option>
        <option value="15">10+ years (A super senior/elderly baby)</option>
    </select>

    <label>🔢 Body Size</label>
    <select id="bodySize" onchange="generateAdvice()">
        <option value="">Select Size...</option>
        <option value="small">Small (<10kg)</option>
        <option value="medium">Medium (10-25kg)</option>
        <option value="large">Large/Giant (>25kg)</option>
    </select>

    <label>🐕‍🦺 Activity</label>
    <select id="activity" onchange="generateAdvice()">
        <option value="">Select Level...</option>
        <option value="old">Too old to walk far</option>
        <option value="lazy">Lazy little piggy (Exercising < 10min/day)</option>
        <option value="good">Good puppy (Daily exercise 30-90min)</option>
        <option value="hyper">Hyperactive (Daily exercise 2hr+)</option>
        <option value="boss">Boss level (Unlimited energy every day)</option>
    </select>

    <label>🦴 Current Weight (kg)</label>
    <input type="number" id="weight" placeholder="Enter weight" oninput="generateAdvice()">

    <div id="result-box"></div>
</div>

<script>
const breedTips = {
    shiba: "Independent Shiba Inus are prone to skin issues; ensure a dry environment and regular grooming.",
    poodle: "Poodles are highly intelligent but prone to luxating patella; keep their curly coats tangle-free.",
    corgi: "Adorable Corgis face significant spinal strain; strict weight management is crucial to prevent injury.",
    maltese: "Maltese dogs require careful heart health monitoring and dry eyes to prevent bacterial infection.",
    golden: "Active Golden Retrievers may need joint supplements like glucosamine and regular health screenings.",
    labrador: "Labradors have a metabolic drive to eat; monitor caloric intake carefully to prevent obesity.",
    frenchie: "Frenchies have unique airways; avoid exercising them in peak heat and ensure good ventilation.",
    dachshund: "Dachshunds have fragile spines; avoid letting them jump from high surfaces or climb steep stairs.",
    schnauzer: "Schnauzers may have genetic predispositions to pancreatitis; a low-fat, high-fiber diet is best.",
    pomeranian: "Small-boned Pomeranians are prone to tracheal collapse; use a harness instead of a collar.",
    husky: "Huskies are vulnerable to heatstroke in humid climates; ensure they stay hydrated and cool.",
    beagle: "Food-motivated Beagles have a high drive; ensure they have outlets for their powerful sense of smell.",
    border: "Border Collies are geniuses; they need both intense physical exercise and mental sniff games.",
    chihuahua: "Tiny Chihuahuas struggle with temperature regulation; keep them warm during cold snaps.",
    pug: "Pugs have deep facial wrinkles that need daily cleaning to prevent moisture-related infections.",
    "shih-tzu": "Shih Tzus have prominent eyes; be careful with sharp objects during play to prevent injury.",
    yorkshire: "Yorkies have sensitive gums; establish a teeth-brushing routine early to prevent tooth loss.",
    taiwan: "Taiwan Mixes are resilient but still need consistent heartworm and tick prevention.",
    samoyed: "Fluffy Samoyeds have dense coats; ensure they are dried thoroughly after bathing to avoid hotspots.",
    bichon: "Bichon Frises are prone to separation anxiety and need regular professional grooming."
};

function generateAdvice() {
    const breed = document.getElementById('breed');
    const ageVal = document.getElementById('age').value;
    const bodySize = document.getElementById('bodySize').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const activityVal = document.getElementById('activity').value;
    const resultBox = document.getElementById('result-box');

    if (!breed.value || !ageVal || !bodySize || !activityVal) {
        resultBox.style.display = "none";
        return;
    }

    // Weight Overweight Logic
    let weightAdvice = "";
    if (weight) {
        if (bodySize === "small" && weight > 10) weightAdvice = "<span class='highlight-key'>Weight is noticeably high for a small dog.</span> Consider a vet-approved weight loss plan.";
        else if (bodySize === "medium" && weight > 25) weightAdvice = "<span class='highlight-key'>Weight exceeds the standard for medium breeds.</span> Increase activity levels.";
        else if (bodySize === "large" && weight > 45) weightAdvice = "<span class='highlight-key'>Excess weight in large breeds puts high stress on the heart.</span> Strict calorie control is vital.";
    }

    // Activity Advice
    let activityAdvice = "";
    if (activityVal === "old") activityAdvice = "Since your dog is older, focus on gentle strolls and don't push them too hard.";
    else if (activityVal === "lazy") activityAdvice = "Activity levels are quite low. Try increasing walk frequency slowly.";
    else if (activityVal === "good") activityAdvice = "Your dog has a very healthy exercise habit. Keep up the great work!";
    else if (activityVal === "hyper" || activityVal === "boss") activityAdvice = "With such high energy levels, daily interactive play or nose-work is highly recommended.";

    // Table Logic
    const tableData = [
        {age: 1, s: 15, m: 15, l: 12},
        {age: 2, s: 24, m: 24, l: 22},
        {age: 3, s: 28, m: 28, l: 31}, // Representing 3-5
        {age: 5, s: 36, m: 36, l: 45}, 
        {age: 10, s: 56, m: 60, l: 79},
        {age: 15, s: 76, m: 83, l: 114}
    ];

    let tableHTML = `<table class="age-table">
        <thead>
            <tr>
                <th>Dog Age</th>
                <th>Small (<10kg)</th>
                <th>Medium (11-25kg)</th>
                <th>Large (>25kg)</th>
            </tr>
        </thead>
        <tbody>`;

    tableData.forEach(row => {
        const isAgeMatch = (parseInt(ageVal) === row.age) || (ageVal == "4" && (row.age == 3 || row.age == 5));
        tableHTML += `<tr>
            <td>${row.age == 3 ? '3-5' : (row.age == 15 ? '10+' : row.age)} year(s)</td>
            <td class="${isAgeMatch && bodySize === 'small' ? 'match-highlight' : ''}">${row.s} yrs</td>
            <td class="${isAgeMatch && bodySize === 'medium' ? 'match-highlight' : ''}">${row.m} yrs</td>
            <td class="${isAgeMatch && bodySize === 'large' ? 'match-highlight' : ''}">${row.l} yrs</td>
        </tr>`;
    });
    tableHTML += `</tbody></table>`;

    // Final Detail Composition
    let detail = `Based on the data provided, here are the key points to note: ${breedTips[breed.value]} ${weightAdvice} ${activityAdvice}`;

    resultBox.innerHTML = `
        <span class="advice-header">⭐️ Quick Advice</span>
        ${detail}
        <br><br><b>Age Comparison Table (Dog vs. Human Years):</b>
        ${tableHTML}
        <p style="font-size: 11px; color: #999; margin-top: 10px;">According to the data provided by the owner, the dog's requirements are based on size and age metrics.</p>
    `;
    resultBox.style.display = "block";
}
</script>

</body>
</html>
