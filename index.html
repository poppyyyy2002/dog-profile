<!DOCTYPE html>
<html>
<head>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }
  .canvas {
    width: 300px;
    height: 300px;
    background-color: white;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  .yellow-ball {
    width: 150px;
    height: 150px;
    background-color: #FFEB3B;
    border-radius: 50%;
    position: relative;
    border: 6px solid #FBC02D;
    box-shadow: inset -5px -5px 0px rgba(0,0,0,0.05);
  }
  .eyes {
    position: absolute;
    top: 55px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    padding: 0 35px;
    box-sizing: border-box;
  }
  .eye {
    width: 14px;
    height: 14px;
    background-color: #5D4037;
    border-radius: 50%;
  }
  .mouth {
    position: absolute;
    bottom: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 4px;
    background-color: #5D4037;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="yellow-ball">
    <div class="eyes">
      <div class="eye"></div>
      <div class="eye"></div>
    </div>
    <div class="mouth"></div>
  </div>
</div>

</body>
</html>
