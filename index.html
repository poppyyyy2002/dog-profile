<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Profile Assistant 🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #faefba; 
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }

        .lang-switch { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .lang-btn {
            background: white; border: 2px solid #3ebc8e; color: #3ebc8e;
            padding: 6px 15px; border-radius: 20px; cursor: pointer;
            font-weight: 600; font-size: 13px; transition: 0.3s;
        }
        .lang-btn.active { background: #3ebc8e; color: white; }

        .card { 
            background: rgba(255, 255, 255, 0.96); width: 100%; max-width: 550px;
            border-radius: 35px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            padding: 40px; border: 4px solid #fff; box-sizing: border-box; margin-bottom: 20px;
            position: relative; animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { text-align: center; color: #3ebc8e; font-family: 'Fredoka', sans-serif; font-size: 42px; margin: 10px 0 5px 0; }
        .author-tag { text-align: center; color: #BEBEBE; font-size: 13px; margin-bottom: 35px; display: block; }

        label { font-weight: 600; color: #7B7B7B; display: block; margin-top: 22px; font-size: 14px; }
        select, input { 
            width: 100%; padding: 14px; margin-top: 10px; border: 2px solid #fcf2d1; 
            border-radius: 15px; background-color: #fffdf5; font-size: 15px; outline: none;
            box-sizing: border-box; transition: 0.3s;
        }

        /* ✨ Doggy Mood Reader 原始正確版本視覺設定 */
        .game-section { border-top: 2.5px solid #faefba; margin-top: 40px; padding-top: 30px; text-align: center; }
        .game-title { font-family: 'Fredoka', sans-serif; color: #f7bf6e; font-size: 26px; }
        
        .symbol-container { display: flex; justify-content: center; gap: 30px; margin-top: 25px; height: 70px; align-items: center; }
        
        .face-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #ccc; 
            position: relative; cursor: pointer; transition: 0.3s;
        }

        /* 眼睛：使用 pseudo-elements 確保穩定出現在臉部上半部 */
        .face-btn::before, .face-btn::after {
            content: ''; position: absolute; width: 6px; height: 6px; 
            background: #999; border-radius: 50%; top: 14px;
        }
        .face-btn::before { left: 12px; }
        .face-btn::after { right: 12px; }

        /* Happy */
        .face-happy { border-color: #3ebc8e; }
        .face-happy::before, .face-happy::after { background: #3ebc8e; }
        .face-happy .mouth { 
            position: absolute; width: 22px; height: 11px; border-radius: 0 0 22px 22px; 
            border: 3px solid #3ebc8e; border-top: 0; bottom: 8px; left: 11px; 
        }

        /* Neutral */
        .face-neutral { border-color: #999; }
        .face-neutral .mouth { 
            position: absolute; width: 18px; height: 3px; background: #999; bottom: 13px; left: 13px; 
        }

        /* Angry */
        .face-angry { border-color: #f7bf6e; }
        .face-angry::before, .face-angry::after { background: #f7bf6e; }
        .face-angry .mouth { 
            position: absolute; width: 18px; height: 8px; border-radius: 18px 18px 0 0; 
            border: 3px solid #f7bf6e; border-bottom: 0; bottom: 10px; left: 13px; 
        }

        #feedback-thanks { font-size: 14px; color: #3ebc8e; margin-top: 15px; font-weight: 600; min-height: 20px; }
    </style>
</head>
<body>

<div class="lang-switch">
    <button class="lang-btn active" id="btn-en" onclick="changeLang('en')">EN</button>
    <button class="lang-btn" id="btn-zh" onclick="changeLang('zh')">繁中</button>
</div>

<div class="card">
    <div class="dog-header">
        <h2 data-i18n="title">Dog Profile</h2>
        <span class="author-tag">Made by Poppy H.</span>
    </div>

    <label data-i18n="label-age">🎂 Dog Age</label>
    <select id="age"></select>

    <label data-i18n="label-size">🔢 Body Size</label>
    <select id="size"></select>

    <label data-i18n="label-activity">🐕‍🦺 Activity</label>
    <select id="activity"></select>

    <label data-i18n="label-weight">🦴 Current Weight (kg)</label>
    <input type="number" id="weight">

    <div class="game-section">
        <div class="game-title" data-i18n="game-title">✨ Doggy Mood Reader</div>
        <div class="symbol-container">
            <div class="face-btn face-happy" onclick="submitFeedback('happy')"><div class="mouth"></div></div>
            <div class="face-btn face-neutral" onclick="submitFeedback('neutral')"><div class="mouth"></div></div>
            <div class="face-btn face-angry" onclick="submitFeedback('angry')"><div class="mouth"></div></div>
        </div>
        <p id="feedback-thanks"></p>
    </div>
</div>

<script>
let currentLang = 'en';

const i18n = {
    en: {
        title: "Dog Profile",
        "label-age": "🎂 Dog Age",
        "age-1": "0-1 year old, still a baby growing up",
        "age-2": "2 years old, a young adult in the prime of youth",
        "age-3-5": "3-5 years old, in their prime years",
        "age-7-10": "7-10 years old, has entered the senior stage",
        "age-10+": "Over 10 years old, a super old baby now",
        "label-size": "🔢 Body Size",
        "size-mini": "Mini (<4kg)", "size-small": "Small (<10kg)", "size-medium": "Medium (11-25kg)", "size-large": "Large (26-45kg)", "size-giant": "Extra Large/Giant (>45kg)",
        "label-activity": "🐕‍🦺 Activity",
        "act-1": "Too old to walk",
        "act-2": "Lazy piggy, dislikes exercise or <10min daily",
        "act-3": "Normal good puppy, 30min-90min exercise daily",
        "act-4": "Hyperactive child, 2HR+ exercise daily",
        "act-5": "Boss level, endless energy every day",
        "label-weight": "🦴 Current Weight (kg)",
        "game-title": "✨ Doggy Mood Reader",
        "thanks-happy": "Glad you think so! 🐾", "thanks-neutral": "We'll try better!", "thanks-angry": "Sorry about that!"
    },
    zh: {
        title: "狗狗檔案",
        "label-age": "🎂 狗狗年齡",
        "age-1": "0-1歲，還是小寶寶正在長大中",
        "age-2": "2 歲，是個小大人了，正在青年成熟期",
        "age-3-5": "3-5 歲，是狗狗們的壯年期",
        "age-7-10": "7 歲-10 歲，已經進入熟齡期囉",
        "age-10+": "10歲以上是超級老寶寶了",
        "label-size": "🔢 體型",
        "size-mini": "迷你型（<4kg）", "size-small": "小型（<10kg）", "size-medium": "中型（11-25kg）", "size-large": "大型（26-45kg）", "size-giant": "超大型/巨型（>45kg）",
        "label-activity": "🐕‍🦺 活動量",
        "act-1": "年紀太大了，走不動了",
        "act-2": "懶惰的小豬，不愛運動或是每日運動10min內",
        "act-3": "正常乖寶寶，每天運動30min-90min",
        "act-4": "過動兒，每天運動2HR以上",
        "act-5": "大魔王等級，每天都有用不完的體力",
        "label-weight": "🦴 目前體重 (kg)",
        "game-title": "✨ 狗狗心情解讀器",
        "thanks-happy": "太棒了，你也懂我！🐾", "thanks-neutral": "我們會再接再厲！", "thanks-angry": "下次會更準的！"
    }
};

function populateDropdowns() {
    // Age
    const ageSelect = document.getElementById('age');
    ageSelect.innerHTML = "";
    ["age-1", "age-2", "age-3-5", "age-7-10", "age-10+"].forEach(key => {
        const opt = document.createElement('option');
        opt.value = key; opt.innerText = i18n[currentLang][key];
        ageSelect.appendChild(opt);
    });

    // Size
    const sizeSelect = document.getElementById('size');
    sizeSelect.innerHTML = "";
    ["size-mini", "size-small", "size-medium", "size-large", "size-giant"].forEach(key => {
        const opt = document.createElement('option');
        opt.value = key; opt.innerText = i18n[currentLang][key];
        sizeSelect.appendChild(opt);
    });

    // Activity
    const actSelect = document.getElementById('activity');
    actSelect.innerHTML = "";
    for(let i=1; i<=5; i++) {
        const opt = document.createElement('option');
        opt.value = `act-${i}`; opt.innerText = i18n[currentLang][`act-${i}`];
        actSelect.appendChild(opt);
    }
}

function changeLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if(i18n[lang][key]) el.innerText = i18n[lang][key];
    });
    populateDropdowns();
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${lang}`).classList.add('active');
}

function submitFeedback(type) {
    document.getElementById('feedback-thanks').innerText = i18n[currentLang][`thanks-${type}`];
}

// Initial setup
populateDropdowns();
</script>
</body>
</html>
