<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>狗狗檔案 🐾</title>
    <style>
        body { 
            background-color: #fff9f0; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            display: flex; justify-content: center; padding: 20px;
        }
        .card { 
            background: white; width: 100%; max-width: 480px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(230, 126, 34, 0.15);
            padding: 40px; border: 3px solid #ffedda;
        }

        /* 1. Logo 置中與放大 */
        .dog-logo { text-align: center; margin-bottom: 20px; }
        .dog-logo img { width: 180px; height: auto; }

        h2 { text-align: center; color: #d35400; font-size: 28px; margin-bottom: 5px; }
        
        /* 7. Made by Poppy H. 小字 */
        .author-tag { 
            text-align: center; color: #BEBEBE; font-size: 12px; 
            margin-bottom: 30px; display: block;
        }

        label { 
            font-weight: bold; color: #7B7B7B; 
            display: block; margin-top: 20px; font-size: 15px; 
        }
        
        select, input { 
            width: 100%; padding: 12px; margin-top: 8px;
            border: 2px solid #ffedda; border-radius: 12px;
            background-color: #fffaf5; font-size: 16px; outline: none;
        }

        #result-box { 
            margin-top: 30px; padding: 25px; border-radius: 15px;
            background-color: #fff; border: 2px solid #ffedda;
            color: #444; line-height: 1.8; display: none;
        }

        /* 2. 小小建議標題樣式 */
        .advice-header {
            text-align: center;
            font-weight: bold;
            color: #4F4F4F;
            background-color: #E0E0E0;
            padding: 8px 20px;
            border-radius: 20px; /* 圓弧長方形 */
            display: block;
            width: fit-content;
            margin: 0 auto 20px auto;
        }

        .highlight {
            background: linear-gradient(transparent 60%, #fff176 0%);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 1. Logo -->
    <div class="dog-logo">
        <img src="S__155754498-removebg-preview.png" alt="Dog Logo">
    </div>

    <!-- 7. 標題與署名 -->
    <h2>狗狗檔案</h2>
    <span class="author-tag">Made by Poppy H.</span>

    <label>🐾 狗狗品種</label>
    <select id="breed" onchange="generateAdvice()">
        <option value="">請選擇...</option>
        <option value="shiba">柴犬</option><option value="poodle">貴賓狗</option>
        <option value="corgi">柯基</option><option value="maltese">馬爾濟斯</option>
        <option value="golden">黃金獵犬</option><option value="labrador">拉不拉多</option>
        <option value="frenchie">法鬥</option><option value="dachshund">臘腸狗</option>
        <option value="schnauzer">雪納瑞</option><option value="pomeranian">博美狗</option>
        <option value="husky">哈士奇</option><option value="beagle">米格魯</option>
        <option value="border">邊境牧羊犬</option><option value="chihuahua">吉娃娃</option>
        <option value="pug">巴哥</option><option value="shih-tzu">西施犬</option>
        <option value="yorkshire">約克夏</option><option value="taiwan">台灣米克斯</option>
        <option value="samoyed">薩摩耶</option><option value="bichon">比熊犬</option>
    </select>

    <label>🎂 狗狗年齡</label>
    <select id="age" onchange="generateAdvice()">
        <option value="">請選擇...</option>
        <option value="幼犬">未滿 1 歲</option>
        <option value="成犬">1 ~ 7 歲</option>
        <option value="高齡犬">超過 7 歲</option>
    </select>

    <!-- 3. 體型選項 -->
    <label>🔢 體型</label>
    <select id="bodySize" onchange="generateAdvice()">
        <option value="">請選擇...</option>
        <option value="mini">迷你型 (<4kg)</option>
        <option value="small">小型 (<10kg)</option>
        <option value="medium">中型 (11-25kg)</option>
        <option value="large">大型 (26-45kg)</option>
        <option value="giant">超大型/巨型 (>45kg)</option>
    </select>

    <!-- 5. 活動力選項 -->
    <label>🐕‍🦺 活動力</label>
    <select id="activity" onchange="generateAdvice()">
        <option value="">請選擇...</option>
        <option value="old">年紀太大了，走不動了</option>
        <option value="lazy">懶惰的小豬，不愛運動或每日運動10min內</option>
        <option value="good">正常乖寶寶，每天運動30min-90min</option>
        <option value="hyper">過動兒，每天運動2HR以上</option>
        <option value="boss">大魔王等級，每天都有用不完的體力</option>
    </select>

    <label>🦴 目前體重 (kg)</label>
    <input type="number" id="weight" placeholder="請輸入數字" oninput="generateAdvice()">

    <div id="result-box"></div>
</div>

<script>
const breedTips = {
    shiba: "性格獨立的柴犬容易有皮膚問題，建議定期檢查毛囊並維持環境乾燥。",
    poodle: "貴賓狗須注意關節保養與先天性氣管塌陷風險，定期梳理能預防皮膚發炎。",
    corgi: "柯基犬脊椎負擔極重，必須嚴格控管體重以預防椎間盤疾病。",
    maltese: "馬爾濟斯需留意心臟瓣膜問題，並維持眼周乾爽預防紅眼眶與細菌感染。",
    golden: "黃金獵犬運動量極大，建議適度補充葡萄糖胺保護關節，並留意皮膚腫瘤。",
    labrador: "拉不拉多代謝基因旺盛，容易攝取過多熱量導致代謝疾病。",
    frenchie: "法鬥呼吸道結構特殊，需特別注意環境通風並避開正午時段散步。",
    dachshund: "臘腸狗脊椎修長脆弱，日常應避免跳躍沙發或爬樓梯等衝擊動作。",
    schnauzer: "雪納瑞有遺傳性高血脂風險，飲食建議以低脂肪、高纖維為主。",
    pomeranian: "博美狗骨頭細小，需預防膝蓋骨脫位，建議家中鋪設止滑墊。",
    husky: "哈士奇在台灣氣候易發生熱衰竭，需隨時補充水分並注意排解精力。",
    beagle: "米格魯食慾強烈且活動力高，若體力未適度消耗容易產生破壞行為。",
    border: "邊牧需要極高的心智刺激，除了體力訓練，嗅聞遊戲也是關鍵。",
    chihuahua: "吉娃娃體溫調節較弱，冷熱溫差大時容易感冒，需多注意室內溫控。",
    pug: "巴哥臉部皺褶深，需每天清潔避免潮濕發霉引起異味或感染。",
    "shih-tzu": "西施犬眼睛大而突出，玩耍時應避開尖銳物品以防止眼球挫傷。",
    yorkshire: "約克夏牙齦較敏感，需注意口腔健康，避免發生早發性掉牙。",
    taiwan: "台灣米克斯體質強健，但仍需定期預防心絲蟲與壁蝨傳染病。",
    samoyed: "薩摩耶毛量豐厚，洗澡後務必深層吹乾以防濕疹與黴菌感染。",
    bichon: "比熊犬需定期修剪毛髮維持視覺清爽，也要注意分離焦慮的緩解。"
};

function generateAdvice() {
    const breed = document.getElementById('breed');
    const age = document.getElementById('age').value;
    const bodySize = document.getElementById('bodySize').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const activity = document.getElementById('activity').value;
    const resultBox = document.getElementById('result-box');

    if (!breed.value || !age || !bodySize || !activity) {
        resultBox.style.display = "none";
        return;
    }

    const breedName = breed.options[breed.selectedIndex].text;
    const activityName = document.getElementById('activity').options[document.getElementById('activity').selectedIndex].text;
    
    // 4. 體重超標判斷 (專業邏輯)
    let weightAdvice = "";
    if (weight) {
        if (bodySize === "mini" && weight > 4) weightAdvice = "<span class='highlight'>目前體重已明顯超出迷你型標準</span>，建議減少零食給予並諮詢獸醫專業減重計畫。";
        else if (bodySize === "small" && weight > 10) weightAdvice = "<span class='highlight'>目前體重略高於小型犬範疇</span>，需注意關節負荷，建議每日定時定量用餐。";
        else if (bodySize === "medium" && weight > 25) weightAdvice = "<span class='highlight'>目前體重超出中型犬標準</span>，請適度調整飲食內容並維持穩定運動量。";
        else if (bodySize === "large" && weight > 45) weightAdvice = "<span class='highlight'>大型犬體重過重會嚴重壓迫心肺系統</span>，務必進行嚴謹的卡路里控管。";
    }

    // 5. 活動力建議
    let activityAdvice = "";
    if (activity === "old") activityAdvice = "因狗狗年事已高，活動應以慢走為主，不宜勉強運動。";
    else if (activity === "lazy") activityAdvice = "狗狗活動量明顯不足，容易累積脂肪，建議循序漸進增加散步頻率。";
    else if (activity === "good") activityAdvice = "狗狗擁有非常健康的運動習慣，請繼續維持目前的作息。";
    else if (activity === "hyper" || activity === "boss") activityAdvice = "您的狗狗擁有驚人的精力，強烈建議每天安排高強度的跑跳或嗅聞遊戲。";

    // 整合文字
    let intro = `您家中的 <b>${breedName}</b> 目前處於 <b>${age}</b> 階段，活動力表現為「${activityName}」。`;
    let detail = `<br><br>根據主人提供的數據，狗狗需要注意：${breedTips[breed.value]} ${weightAdvice} ${activityAdvice}`;

    resultBox.innerHTML = `
        <span class="advice-header">⭐️小小建議</span>
        ${intro}${detail}
    `;
    resultBox.style.display = "block";
}
</script>

</body>
</html>
