<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Profile Pro 🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

        body {

            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
        }

        .lang-switch { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .lang-btn {
            background: white; border: 2px solid #3ebc8e; color: #3ebc8e;
            padding: 6px 15px; border-radius: 20px; cursor: pointer;
            font-weight: 600; font-size: 13px; transition: 0.3s;
        }
        .lang-btn.active { background: #3ebc8e; color: white; }

        .card { 
            background: rgba(255, 255, 255, 0.95); width: 100%; max-width: 550px;
            border-radius: 35px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            padding: 40px; border: 4px solid #fff; box-sizing: border-box; margin-bottom: 20px;
            position: relative; animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Logo and Speech Bubble */
        .dog-logo-container { position: relative; width: 180px; margin: 0 auto 15px auto; text-align: center; }
        .dog-logo img { width: 180px; height: auto; display: block; transition: transform 0.3s ease; cursor: pointer; }
        .dog-logo img:hover { animation: shake 0.5s ease-in-out; }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(-5deg); }
            75% { transform: rotate(3deg); }
            100% { transform: rotate(0deg); }
        }

        .speech-bubble {
            position: absolute; top: -20px; right: -40px;
            background: #3ebc8e; color: white; padding: 6px 12px;
            border-radius: 15px; font-size: 14px; font-weight: 600;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            white-space: nowrap;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 15px;
            border-width: 8px 8px 0; border-style: solid; border-color: #3ebc8e transparent;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 { text-align: center; color: #3ebc8e; font-family: 'Fredoka', sans-serif; font-size: 42px; margin: 10px 0 5px 0; }
        .author-tag { text-align: center; color: #BEBEBE; font-size: 13px; margin-bottom: 35px; display: block; }

        label { font-weight: 600; color: #7B7B7B; display: block; margin-top: 22px; font-size: 14px; }
        select, input { 
            width: 100%; padding: 14px; margin-top: 10px; border: 2px solid #fcf2d1; 
            border-radius: 15px; background-color: #fffdf5; font-size: 15px; outline: none;
            font-family: 'Poppins', sans-serif; color: #444; box-sizing: border-box; transition: 0.3s;
        }
        select:focus, input:focus { border-color: #f7bf6e; background-color: #fff; }

        #result-box { 
            margin-top: 40px; padding: 30px; border-radius: 25px; background-color: #fff; 
            border: 2px dashed #3ebc8e; color: #444; line-height: 1.8; display: none; font-size: 15px;
        }

        .advice-header {
            text-align: center; font-weight: 600; padding: 10px 20px; border-radius: 50px; 
            display: block; width: fit-content; margin: 0 auto 20px auto; font-size: 15px;
            background-color: #fef4d1; color: #b58105; border: 1px solid #f7bf6e;
        }

        .advice-item { margin-bottom: 15px; padding-left: 10px; position: relative; }
        /* Removed advice-item::before emoji */

        .age-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .age-table th, .age-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .age-table th { background-color: #f9f9f9; color: #7B7B7B; }
        .match-highlight { background-color: rgba(247, 191, 110, 0.2); color: #e67e22; font-weight: 600; border: 2.5px solid #f7bf6e !important; }

        .game-section { border-top: 2.5px solid #faefba; margin-top: 40px; padding-top: 30px; text-align: center; }
        .game-title { font-family: 'Fredoka', sans-serif; color: #f7bf6e; font-size: 26px; margin-bottom: 10px; }
        .game-desc { font-size: 13px; color: #999; margin-bottom: 20px; }
        .game-input-group { display: flex; gap: 10px; justify-content: center; }
        .game-input { width: 90px !important; margin-top: 0 !important; text-align: center; border-radius: 12px; }
        .game-btn { background-color: #f7bf6e; color: white; border: none; padding: 10px 25px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .game-btn:hover { background-color: #e67e22; transform: translateY(-2px); }
        #mood-result { margin-top: 25px; font-weight: 600; color: #444; min-height: 45px; font-size: 17px; padding: 0 10px; }

        .feedback-section { margin-top: 25px; display: none; }
        .symbol-container { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
        .face-btn { width: 42px; height: 42px; border-radius: 50%; border: 3.5px solid #ccc; position: relative; cursor: pointer; transition: 0.3s; }
        .face-btn:hover { transform: scale(1.2); }
        .face-happy { border-color: #3ebc8e; }
        .face-happy .mouth { position: absolute; width: 16px; height: 8px; border-radius: 0 0 16px 16px; border: 2.5px solid #3ebc8e; border-top: 0; bottom: 8px; left: 11px; }
        .face-neutral { border-color: #999; }
        .face-neutral .mouth { position: absolute; width: 16px; height: 2.5px; background: #999; bottom: 11px; left: 13px; }
        .face-angry { border-color: #f7bf6e; }
        .face-angry .mouth { position: absolute; width: 14px; height: 6px; border-radius: 14px 14px 0 0; border: 2.5px solid #f7bf6e; border-bottom: 0; bottom: 8px; left: 12px; }
    </style>
</head>
<body>

<div class="lang-switch">
    <button class="lang-btn active" id="btn-en" onclick="changeLang('en')">EN</button>
    <button class="lang-btn" id="btn-zh" onclick="changeLang('zh')">繁中</button>
</div>

<div class="card">
    <div class="dog-logo-container">
        <div class="speech-bubble" id="bubble" data-i18n="bubble-text">Woof!</div>
        <div class="dog-logo">
            <img src="S__155754498-removebg-preview.png" alt="Dog Logo">
        </div>
    </div>

    <h2 data-i18n="title">Dog Profile</h2>
    <span class="author-tag">Made by Poppy H.</span>

    <label data-i18n="label-breed">🐾 Dog Breed</label>
    <select id="breed" onchange="generateAdvice()">
        <option value="" data-i18n="opt-breed">Select Breed...</option>
    </select>

    <label data-i18n="label-age">🎂 Dog Age</label>
    <select id="age" onchange="generateAdvice()">
        <option value="" data-i18n="opt-age">Select Age...</option>
        <option value="1" data-i18n="age-1">0-1 year (Baby)</option>
        <option value="2" data-i18n="age-2">2 years (Young adult)</option>
        <option value="4" data-i18n="age-4">3-5 years (Prime)</option>
        <option value="10" data-i18n="age-10">7-10 years (Senior)</option>
        <option value="15" data-i18n="age-15">10+ years (Elderly baby)</option>
    </select>

    <label data-i18n="label-size">🔢 Body Size</label>
    <select id="bodySize" onchange="generateAdvice()">
        <option value="" data-i18n="opt-size">Select Size...</option>
        <option value="mini" data-i18n="size-mini">Mini (<4kg)</option>
        <option value="small" data-i18n="size-s">Small (<10kg)</option>
        <option value="medium" data-i18n="size-m">Medium (11-25kg)</option>
        <option value="large" data-i18n="size-l">Large (26-45kg)</option>
        <option value="giant" data-i18n="size-giant">Giant (>45kg)</option>
    </select>

    <label data-i18n="label-activity">🐕‍🦺 Activity</label>
    <select id="activity" onchange="generateAdvice()">
        <option value="" data-i18n="opt-activity">Select Level...</option>
        <option value="old" data-i18n="act-old">Too old to walk</option>
        <option value="lazy" data-i18n="act-lazy">Lazy piggy (< 10min/day)</option>
        <option value="good" data-i18n="act-good">Good puppy (30-90min/day)</option>
        <option value="hyper" data-i18n="act-hyper">Hyperactive (2hr+/day)</option>
        <option value="boss" data-i18n="act-boss">Boss level (Unlimited energy)</option>
    </select>

    <label data-i18n="label-weight">🦴 Current Weight (kg)</label>
    <input type="number" id="weight" placeholder="Enter weight" oninput="generateAdvice()">

    <div id="result-box"></div>

    <div class="game-section">
        <div class="game-title" data-i18n="game-title">✨ Doggy Mood Reader</div>
        <div class="game-desc" data-i18n="game-desc">Pick a number (0-100) to see how your dog feels!</div>
        <div class="game-input-group">
            <input type="number" id="moodNumber" class="game-input" placeholder="0-100" min="0" max="100">
            <button class="game-btn" onclick="readDogMood()" data-i18n="game-btn">Check Mood</button>
        </div>
        <div id="mood-result"></div>
        <div class="feedback-section" id="feedbackArea">
            <p style="font-size: 12px; color: #7B7B7B; margin-bottom: 10px;" data-i18n="is-accurate">Is this accurate?</p>
            <div class="symbol-container">
                <div class="face-btn face-happy" onclick="submitFeedback('Happy')"><div class="mouth"></div></div>
                <div class="face-btn face-neutral" onclick="submitFeedback('Neutral')"><div class="mouth"></div></div>
                <div class="face-btn face-angry" onclick="submitFeedback('Angry')"><div class="mouth"></div></div>
            </div>
            <p id="feedback-thanks" style="font-size: 11px; color: #3ebc8e; margin-top: 15px; font-weight:600;"></p>
        </div>
    </div>
</div>

function populateBreeds() {
    const breedSelect = document.getElementById('breed');
    const currentValue = breedSelect.value;
    breedSelect.innerHTML = `<option value="" data-i18n="opt-breed">${i18n[currentLang]['opt-breed']}</option>`;
    for (const [key, names] of Object.entries(breeds)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.innerText = names[currentLang];
        breedSelect.appendChild(opt);
    }
    breedSelect.value = currentValue;
}

function updateBubbleText() {
    const bubble = document.getElementById('bubble');
    const texts = currentLang === 'en' ? ["Woof!", "Hi!"] : ["嗨！", "汪汪！"];
    // Simple toggle between the two strings
    let currentText = bubble.innerText;
    bubble.innerText = currentText === texts[0] ? texts[1] : texts[0];
}

function changeLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if(i18n[lang][key]) el.innerText = i18n[lang][key];
    });
    document.getElementById('moodNumber').placeholder = "0-100";
    document.getElementById('weight').placeholder = lang === 'en' ? "Enter weight" : "輸入重量";
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    populateBreeds();
    generateAdvice();
}

function generateAdvice() {
    const breed = document.getElementById('breed').value;
    const ageVal = document.getElementById('age').value;
    const bodySize = document.getElementById('bodySize').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const activityVal = document.getElementById('activity').value;
    const resultBox = document.getElementById('result-box');

    if (!breed || !ageVal || !bodySize || !activityVal) {
        resultBox.style.display = "none";
        return;
    }

    let weightAdvice = "";
    if (weight) {
        if ((bodySize === "mini" && weight > 4) || 
            (bodySize === "small" && weight > 10) || 
            (bodySize === "medium" && weight > 25) || 
            (bodySize === "large" && weight > 45) || 
            (bodySize === "giant" && weight > 80)) {
            weightAdvice = `<div class="advice-item" style="color:#e67e22; font-weight:bold;">Warning: ${i18n[currentLang]['weight-high']}</div>`;
        }
    }

    let ageBonus = "";
    if (ageVal === "1") {
        ageBonus = currentLang === 'zh' ? "現在是這孩子的黃金成長期，營養要均衡，也要多帶他探索世界喔！" : "It's the golden age for growth! Focus on balanced nutrition and curiosity.";
    } else if (ageVal === "10" || ageVal === "15") {
        ageBonus = currentLang === 'zh' ? "孩子年紀漸漸大了，動作慢一點也沒關係，我們就陪著他慢慢享受生活。" : "As they get older, it's okay to slow down. Just enjoy the gentle pace together.";
    }

    const tips = breedData[currentLang][breed] || ["No data."];
    let adviceHTML = `<span class="advice-header">${i18n[currentLang]['quick-advice']}</span>`;
    
    // Advice items with no emoji
    tips.forEach(t => { adviceHTML += `<div class="advice-item" style="font-style: italic; color: #555;">「${t}」</div>`; });
    
    if (ageBonus) adviceHTML += `<div class="advice-item" style="color:#3ebc8e; font-weight:600;">${ageBonus}</div>`;
    adviceHTML += weightAdvice;

    const tableData = [
        {age: 1, s: 15, m: 15, l: 12}, {age: 2, s: 24, m: 24, l: 22}, {age: 3, s: 28, m: 28, l: 31},
        {age: 5, s: 36, m: 36, l: 45}, {age: 10, s: 56, m: 60, l: 79}, {age: 15, s: 76, m: 83, l: 114}
    ];

    let tableHTML = `<table class="age-table"><thead><tr><th>Age</th><th>S</th><th>M</th><th>L</th></tr></thead><tbody>`;
    tableData.forEach(row => {
        const isAgeMatch = (parseInt(ageVal) === row.age) || (ageVal == "4" && (row.age == 3 || row.age == 5));
        const colS = (bodySize === 'mini' || bodySize === 'small');
        const colM = (bodySize === 'medium');
        const colL = (bodySize === 'large' || bodySize === 'giant');

        tableHTML += `<tr><td>${row.age == 3 ? '3-5' : (row.age == 15 ? '10+' : row.age)}</td>
            <td class="${isAgeMatch && colS ? 'match-highlight' : ''}">${row.s}</td>
            <td class="${isAgeMatch && colM ? 'match-highlight' : ''}">${row.m}</td>
            <td class="${isAgeMatch && colL ? 'match-highlight' : ''}">${row.l}</td></tr>`;
    });
    tableHTML += `</tbody></table>`;

    resultBox.innerHTML = adviceHTML + `<br><b style="color:#7B7B7B;">${i18n[currentLang]['age-table-title']}</b>` + tableHTML;
    resultBox.style.display = "block";
}

function readDogMood() {
    const num = parseInt(document.getElementById('moodNumber').value);
    const moodDisplay = document.getElementById('mood-result');
    const feedbackArea = document.getElementById('feedbackArea');
    if (isNaN(num) || num < 0 || num > 100) {
        moodDisplay.innerHTML = `<span style='color:red;'>${i18n[currentLang]['error-num']}</span>`;
        return;
    }
    const list = moodDatabase[currentLang];
    const index = Math.min(num, list.length - 1);
    moodDisplay.style.opacity = 0;
    setTimeout(() => {
        moodDisplay.innerHTML = `<span>" ${list[index]} "</span>`;
        moodDisplay.style.opacity = 1;
        moodDisplay.style.transition = "0.5s";
    }, 200);
    feedbackArea.style.display = "block";
    document.getElementById('feedback-thanks').innerText = "";
}

function submitFeedback(type) {
    const thanks = document.getElementById('feedback-thanks');
    thanks.innerText = i18n[currentLang][`thanks-${type.toLowerCase()}`];
}

// Initialize
populateBreeds();
setInterval(updateBubbleText, 3000); // Toggles Woof/Hi every 3s
